name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '41 17 * * 3'

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze Kotlin
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Configured for Temurin Java 21
    - name: Set up JDK 21 (Temurin)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'java-kotlin'
        build-mode: manual

    - name: Build Android App (Release)
      shell: bash
      run: |
        chmod +x gradlew
        # Using --no-daemon is critical for CodeQL to trace the build accurately
        ./gradlew assembleRelease --no-daemon -Porg.gradle.java.installations.auto-download=false 2>&1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:java-kotlin"

